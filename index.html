<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋優学院テニス部</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="朋優テニス部">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --tc-green:#1D9E75;
  --tc-green-dark:#0F6E56;
  --tc-green-light:#E1F5EE;
  --tc-teal:#0BBCD4;
  --tc-grad:linear-gradient(135deg,#1D9E75 0%,#0BBCD4 100%);
  --bg:#F4F6F8;
  --bg-card:#fff;
  --text:#1a1a1a;
  --text-sub:#666;
  --border:#e0e0e0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;}
.header{background:var(--tc-grad);padding:1.25rem 1.25rem 1rem;color:#fff;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.header-title{font-size:18px;font-weight:600;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;}
.user-chip{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:5px 13px;font-size:12px;color:#fff;cursor:pointer;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:13px 8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-sub);border-bottom:2.5px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--tc-green);border-bottom-color:var(--tc-green);}
.body{padding:1rem;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
label{display:block;font-size:11px;font-weight:600;color:var(--text-sub);margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:0.05em;}
label:first-child{margin-top:0;}
select,input,textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);-webkit-appearance:none;}
textarea{resize:none;line-height:1.5;}
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.status-btn{padding:12px;border:1px solid var(--border);border-radius:8px;background:#f5f5f5;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;}
.status-btn.sel-出席{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.status-btn.sel-欠席{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D;}
.status-btn.sel-遅刻{background:#FAEEDA;border-color:#BA7517;color:#854F0B;}
.status-btn.sel-早退{background:#E0F7FA;border-color:#0BBCD4;color:#0891A8;}
.type-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;}
.type-btn{padding:10px 4px;border:1px solid var(--border);border-radius:8px;background:#f5f5f5;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;}
.type-btn.sel-type{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.primary-btn{width:100%;padding:15px;background:var(--tc-grad);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem;}
.primary-btn:active{opacity:0.85;}
.ghost-btn{width:100%;padding:12px;background:none;color:var(--text-sub);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;margin-top:0.75rem;}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-出席{background:#E1F5EE;color:#0F6E56;}
.badge-欠席{background:#FCEBEB;color:#A32D2D;}
.badge-遅刻{background:#FAEEDA;color:#854F0B;}
.badge-早退{background:#E0F7FA;color:#0891A8;}
.record-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0f0;gap:8px;}
.record-row:last-child{border-bottom:none;}
.record-name{font-size:14px;font-weight:500;}
.record-comment{font-size:12px;color:var(--text-sub);margin-top:3px;font-style:italic;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
.stat-num{font-size:30px;font-weight:600;}
.stat-label{font-size:11px;color:var(--text-sub);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;}
.filter-row select{flex:1;font-size:13px;}
.empty{text-align:center;padding:2.5rem 0;color:var(--text-sub);font-size:14px;}
.success-msg{background:#E1F5EE;border:1px solid #1D9E75;color:#0F6E56;border-radius:10px;padding:12px 16px;font-size:14px;margin-top:1rem;display:none;}
.error-msg{background:#FCEBEB;border:1px solid #E24B4A;color:#A32D2D;border-radius:10px;padding:12px 16px;font-size:14px;margin-top:0.75rem;display:none;}
.date-header{font-size:12px;font-weight:600;color:var(--text-sub);margin:1rem 0 0.5rem;display:flex;align-items:center;gap:8px;}
.practice-chip{font-size:11px;padding:2px 9px;background:#E1F5EE;color:#0F6E56;border-radius:20px;font-weight:600;}
.login-header{background:var(--tc-grad);padding:2.5rem 1.25rem 2rem;color:#fff;text-align:center;}
.login-icon{font-size:48px;margin-bottom:0.75rem;}
.login-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:0.25rem;}
.login-sub{font-size:13px;color:rgba(255,255,255,0.85);}
.login-body{padding:1.25rem 1rem;}
.pin-input{letter-spacing:0.4em;font-size:22px;text-align:center;}
.section{display:none;}
.section.active{display:block;}
</style>
</head>
<body>
<div class="app" id="app">

  <div id="view-login" style="display:none;">
    <div class="login-header">
      <div class="login-icon">🎾</div>
      <div class="login-title">朋優学院テニス部</div>
      <div class="login-sub">出欠管理システム</div>
    </div>
    <div class="login-body">
      <div class="card">
        <label>学年</label>
        <select id="login-grade" onchange="updateLoginNames()">
          <option value="">選択してください</option>
          <option value="1">1年生</option>
          <option value="2">2年生</option>
          <option value="teacher">教員（顧問）</option>
        </select>
        <div id="student-name-section" style="display:none;">
          <label>名前</label>
          <select id="login-name"><option value="">選択してください</option></select>
        </div>
      </div>
      <button class="primary-btn" onclick="doLogin()">次へ</button>
    </div>
  </div>

  <div id="view-pin-setup" style="display:none;">
    <div class="login-header">
      <div class="login-icon">🔐</div>
      <div class="login-title">PIN設定</div>
      <div class="login-sub">顧問専用の4桁PINを設定してください</div>
    </div>
    <div class="login-body">
      <div class="card">
        <label>4桁のPINを入力</label>
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin-set1" placeholder="・・・・"/>
        <label>確認のため再入力</label>
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin-set2" placeholder="・・・・"/>
        <div class="error-msg" id="pin-setup-error">PINが一致しません。もう一度入力してください。</div>
      </div>
      <button class="primary-btn" onclick="savePin()">PINを設定する</button>
    </div>
  </div>

  <div id="view-pin-login" style="display:none;">
    <div class="login-header">
      <div class="login-icon">🔑</div>
      <div class="login-title">顧問ログイン</div>
      <div class="login-sub">4桁のPINを入力してください</div>
    </div>
    <div class="login-body">
      <div class="card">
        <label>PIN</label>
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin-login-input" placeholder="・・・・"/>
        <div class="error-msg" id="pin-login-error">PINが正しくありません。</div>
      </div>
      <button class="primary-btn" onclick="doTeacherLogin()">ログイン</button>
      <button class="ghost-btn" onclick="showLoginSelect()">戻る</button>
    </div>
  </div>

  <div id="view-main" style="display:none;">
    <div class="header">
      <div class="header-top">
        <div>
          <div class="header-title">🎾 朋優学院テニス部</div>
          <div class="header-sub">出欠管理システム</div>
        </div>
        <div class="user-chip" onclick="doLogout()" id="user-bar-name"></div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('input')">出欠入力</button>
      <button class="tab" id="tab-admin-btn" onclick="switchTab('admin')" style="display:none;">管理画面</button>
    </div>
    <div class="body">
      <div id="tab-input" class="section active">
        <div class="card">
          <label>日付</label>
          <input type="date" id="input-date"/>
          <label>練習の種類</label>
          <div class="type-btns">
            <div class="type-btn sel-type" onclick="selectType('通常練習')">通常練習</div>
            <div class="type-btn" onclick="selectType('練習試合')">練習試合</div>
            <div class="type-btn" onclick="selectType('公式戦')">公式戦</div>
          </div>
          <div id="type-comment-section" style="display:none;margin-top:10px;">
            <textarea id="type-comment" rows="2" placeholder="対戦相手、試合名等を記入してください"></textarea>
          </div>
          <label>出欠</label>
          <div class="status-btns">
            <div class="status-btn" onclick="selectStatus('出席')">出席</div>
            <div class="status-btn" onclick="selectStatus('欠席')">欠席</div>
            <div class="status-btn" onclick="selectStatus('遅刻')">遅刻</div>
            <div class="status-btn" onclick="selectStatus('早退')">早退</div>
          </div>
          <div id="comment-section" style="display:none;">
            <label>理由（コメント）</label>
            <textarea id="input-comment" rows="2" placeholder="理由を入力してください"></textarea>
          </div>
        </div>
        <button class="primary-btn" onclick="submitRecord()">送信する</button>
        <div class="success-msg" id="success-msg">送信しました！</div>
      </div>

      <div id="tab-admin" class="section">
        <div class="summary-grid">
          <div class="stat-card">
            <div class="stat-num" id="stat-total" style="color:#1D9E75;">0</div>
            <div class="stat-label">本日の記録</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-absent" style="color:#A32D2D;">0</div>
            <div class="stat-label">欠席・遅刻・早退</div>
          </div>
        </div>
        <div class="filter-row">
          <select id="filter-date" onchange="renderAdmin()"><option value="">すべての日付</option></select>
          <select id="filter-status" onchange="renderAdmin()">
            <option value="">すべて</option>
            <option>出席</option><option>欠席</option><option>遅刻</option><option>早退</option>
          </select>
        </div>
        <div id="admin-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const MEMBERS={
  '1':['A男','B男','C男','D男'],
  '2':['E男','F男','G男','H男','I男']
};
let records=JSON.parse(localStorage.getItem('tennis_records')||'[]');
let currentUser=JSON.parse(localStorage.getItem('tennis_user')||'null');
let selectedStatus='';
let selectedType='通常練習';

function init(){
  document.getElementById('input-date').value=new Date().toISOString().split('T')[0];
  if(currentUser){showMain();}else{showLoginSelect();}
}
function hideAll(){['view-login','view-pin-setup','view-pin-login','view-main'].forEach(id=>document.getElementById(id).style.display='none');}
function showLoginSelect(){hideAll();document.getElementById('view-login').style.display='block';}
function showPinSetup(){hideAll();document.getElementById('view-pin-setup').style.display='block';}
function showPinLogin(){hideAll();document.getElementById('pin-login-input').value='';document.getElementById('pin-login-error').style.display='none';document.getElementById('view-pin-login').style.display='block';}
function showMain(){
  hideAll();
  document.getElementById('view-main').style.display='block';
  document.getElementById('user-bar-name').textContent=currentUser.name+' ▾';
  document.getElementById('tab-admin-btn').style.display=currentUser.grade==='teacher'?'block':'none';
}
function updateLoginNames(){
  const grade=document.getElementById('login-grade').value;
  const sec=document.getElementById('student-name-section');
  if(!grade||grade==='teacher'){sec.style.display='none';return;}
  sec.style.display='block';
  const sel=document.getElementById('login-name');
  sel.innerHTML='<option value="">選択してください</option>'+(MEMBERS[grade]||[]).map(m=>`<option>${m}</option>`).join('');
}
function doLogin(){
  const grade=document.getElementById('login-grade').value;
  if(!grade){alert('学年を選択してください');return;}
  if(grade==='teacher'){
    localStorage.getItem('tennis_pin')?showPinLogin():showPinSetup();
    return;
  }
  const name=document.getElementById('login-name').value;
  if(!name){alert('名前を選択してください');return;}
  currentUser={grade,name};
  localStorage.setItem('tennis_user',JSON.stringify(currentUser));
  showMain();
}
function savePin(){
  const p1=document.getElementById('pin-set1').value;
  const p2=document.getElementById('pin-set2').value;
  const err=document.getElementById('pin-setup-error');
  if(p1.length!==4||p1!==p2){err.style.display='block';return;}
  err.style.display='none';
  localStorage.setItem('tennis_pin',p1);
  currentUser={grade:'teacher',name:'顧問'};
  localStorage.setItem('tennis_user',JSON.stringify(currentUser));
  showMain();
}
function doTeacherLogin(){
  const input=document.getElementById('pin-login-input').value;
  const err=document.getElementById('pin-login-error');
  if(input!==localStorage.getItem('tennis_pin')){err.style.display='block';return;}
  err.style.display='none';
  currentUser={grade:'teacher',name:'顧問'};
  localStorage.setItem('tennis_user',JSON.stringify(currentUser));
  showMain();
}
function doLogout(){localStorage.removeItem('tennis_user');currentUser=null;showLoginSelect();}
function selectType(t){
  selectedType=t;
  document.querySelectorAll('.type-btn').forEach(b=>{b.className='type-btn';if(b.textContent===t)b.classList.add('sel-type');});
  const need=t!=='通常練習';
  document.getElementById('type-comment-section').style.display=need?'block':'none';
  if(!need)document.getElementById('type-comment').value='';
}
function selectStatus(s){
  selectedStatus=s;
  document.querySelectorAll('.status-btn').forEach(b=>{b.className='status-btn';if(b.textContent===s)b.classList.add('sel-'+s);});
  const need=['欠席','遅刻','早退'].includes(s);
  document.getElementById('comment-section').style.display=need?'block':'none';
  if(!need)document.getElementById('input-comment').value='';
}
function submitRecord(){
  const date=document.getElementById('input-date').value;
  const comment=document.getElementById('input-comment').value;
  const typeComment=document.getElementById('type-comment').value;
  if(!date||!selectedStatus){alert('日付と出欠を入力してください');return;}
  records.push({date,name:currentUser.name,grade:currentUser.grade,status:selectedStatus,comment,practiceType:selectedType,typeComment,ts:Date.now()});
  localStorage.setItem('tennis_records',JSON.stringify(records));
  document.getElementById('input-comment').value='';
  document.getElementById('type-comment').value='';
  selectedStatus='';
  document.querySelectorAll('.status-btn').forEach(b=>b.className='status-btn');
  selectType('通常練習');
  document.getElementById('comment-section').style.display='none';
  const msg=document.getElementById('success-msg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2000);
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  if(tab==='input'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('tab-input').classList.add('active');
  }else{
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tab-admin').classList.add('active');
    renderAdmin();
  }
}
function renderAdmin(){
  const fd=document.getElementById('filter-date').value;
  const fs=document.getElementById('filter-status').value;
  const dates=[...new Set(records.map(r=>r.date))].sort().reverse();
  const sel=document.getElementById('filter-date');
  const cv=sel.value;
  sel.innerHTML='<option value="">すべての日付</option>'+dates.map(d=>`<option ${d===cv?'selected':''}>${d}</option>`).join('');
  let filtered=records.filter(r=>(!fd||r.date===fd)&&(!fs||r.status===fs));
  filtered.sort((a,b)=>b.ts-a.ts);
  const today=new Date().toISOString().split('T')[0];
  const tr=records.filter(r=>r.date===today);
  document.getElementById('stat-total').textContent=tr.length;
  document.getElementById('stat-absent').textContent=tr.filter(r=>r.status!=='出席').length;
  const list=document.getElementById('admin-list');
  if(!filtered.length){list.innerHTML='<div class="empty">記録がありません</div>';return;}
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.date])grouped[r.date]=[];grouped[r.date].push(r);});
  list.innerHTML=Object.keys(grouped).sort().reverse().map(date=>{
    const recs=grouped[date];
    const pt=recs[0]?.practiceType||'通常練習';
    const tc=recs[0]?.typeComment||'';
    return `<div class="date-header">${date}<span class="practice-chip">${pt}${tc?'：'+tc:''}</span></div>
    <div class="card">${recs.map(r=>`<div class="record-row"><div><div class="record-name">${r.name}</div>${r.comment?`<div class="record-comment">"${r.comment}"</div>`:''}</div><span class="badge badge-${r.status}">${r.status}</span></div>`).join('')}</div>`;
  }).join('');
}
init();
</script>
</body>
</html>
